<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hello 张华群</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: linear-gradient(45deg, #ff004c, #ffae00, #ffe600, #00ff9d, #00c3ff, #8a2be2, #ff004c);
      background-size: 800% 800%;
      animation: bgMove 6s linear infinite;
      font-family: "Impact", "Arial Black", "Microsoft YaHei", sans-serif;
    }

    @keyframes bgMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes spin {
      0%   { transform: rotate(0deg) scale(1); }
      25%  { transform: rotate(3deg) scale(1.05); }
      50%  { transform: rotate(0deg) scale(1.12); }
      75%  { transform: rotate(-3deg) scale(1.05); }
      100% { transform: rotate(0deg) scale(1); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.15); filter: brightness(1.8); }
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      10% { opacity: 0.4; }
      20% { opacity: 1; }
      30% { opacity: 0.2; }
      40% { opacity: 1; }
      50% { opacity: 0.6; }
      60% { opacity: 1; }
      70% { opacity: 0.3; }
      80% { opacity: 1; }
      90% { opacity: 0.8; }
    }

    @keyframes hue {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
    }

    .core {
      position: relative;
      text-align: center;
      transform-style: preserve-3d;
      animation: spin 2.2s ease-in-out infinite, hue 3s linear infinite;
    }

    .main {
      font-size: min(16vw, 180px);
      line-height: 0.9;
      margin: 0;
      padding: 0.15em 0.35em;
      color: #ffffff;
      text-shadow:
        0 0 8px #000,
        0 0 18px #ff00aa,
        0 0 30px #00ffff,
        0 0 45px #ffff00,
        4px 4px 0 #000,
        8px 8px 0 rgba(0,0,0,0.35),
        -4px -4px 0 rgba(255,255,255,0.2);
      letter-spacing: 0.08em;
      transform: rotateX(18deg);
      animation: pulse 1.2s ease-in-out infinite, flicker 4s linear infinite;
      border: 8px double rgba(255,255,255,0.95);
      border-radius: 28px;
      background: rgba(0,0,0,0.18);
      box-shadow:
        0 0 0 8px rgba(255,255,255,0.15),
        0 0 30px rgba(0,0,0,0.5),
        inset 0 0 30px rgba(255,255,255,0.18);
      mix-blend-mode: screen;
    }

    .small {
      display: block;
      font-size: 0.22em;
      margin-bottom: 0.2em;
      letter-spacing: 0.6em;
      color: #000;
      text-shadow:
        0 0 8px #fff,
        0 0 20px #fff,
        0 0 35px #fff;
    }

    .extra {
      position: absolute;
      inset: -10%;
      pointer-events: none;
      border-radius: 50%;
      border: 14px dotted rgba(255,255,255,0.7);
      animation: spin 8s linear infinite reverse;
      filter: blur(0.5px);
    }

    .extra2 {
      position: absolute;
      inset: -18%;
      pointer-events: none;
      border-radius: 24px;
      border: 10px dashed rgba(0,0,0,0.55);
      animation: spin 4s linear infinite;
      mix-blend-mode: multiply;
    }

    .rainbow {
      position: absolute;
      bottom: 6vh;
      left: 0;
      width: 100%;
      font-size: clamp(18px, 3vw, 42px);
      font-weight: 900;
      white-space: nowrap;
      color: #fff;
      text-shadow:
        0 0 5px #000,
        0 0 10px #ff00ff,
        0 0 20px #00ffff;
      animation: hue 2.5s linear infinite;
      transform: scale(1.4);
    }

    .blast {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 20vw;
      font-weight: 900;
      color: rgba(255,255,255,0.12);
      letter-spacing: 0.2em;
      transform: rotate(-12deg);
      user-select: none;
      pointer-events: none;
      text-shadow:
        0 0 12px rgba(0,0,0,0.5),
        0 0 40px rgba(255,255,255,0.25);
    }

    .stamp {
      position: absolute;
      top: 4vh;
      left: 4vw;
      font-size: clamp(22px, 4vw, 60px);
      padding: 0.25em 0.5em;
      color: #ff0000;
      background: #fff;
      border: 6px solid #000;
      transform: rotate(-12deg);
      box-shadow: 10px 10px 0 rgba(0,0,0,0.35);
      animation: pulse 0.8s ease-in-out infinite;
    }

    .strip {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      font-size: clamp(14px, 2vw, 26px);
      font-weight: 900;
      color: #fff;
      background: rgba(0,0,0,0.45);
      border-bottom: 3px solid rgba(255,255,255,0.85);
      text-shadow: 0 0 8px #ff0, 0 0 12px #0ff;
      padding: 0.3em 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .scrolltext {
      display: inline-block;
      padding-left: 100%;
      animation: scroll 10s linear infinite;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <div class="strip">
    <span class="scrolltext">🔥🔥🔥  hello 张华群  hello 张华群  hello 张华群  hello 张华群  hello 张华群  🔥🔥🔥</span>
  </div>

  <div class="stamp">超·夸·张</div>
  <div class="blast">张华群</div>

  <div class="wrap">
    <div class="core">
      <div class="extra"></div>
      <div class="extra2"></div>
      <div class="main">
        <span class="small">HELLO</span>
        张华群
      </div>
    </div>
  </div>

  <div class="rainbow">
    <marquee behavior="alternate" scrollamount="18" direction="left">
      ✨ hello 张华群 ✨ hello 张华群 ✨ hello 张华群 ✨ hello 张华群 ✨
    </marquee>
  </div>
</body>
</html>
