<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hello 张华群</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: linear-gradient(45deg, #ff004c, #ffae00, #ffe600, #00ff9d, #00c3ff, #8a2be2, #ff004c);
      background-size: 800% 800%;
      animation: bgMove 6s linear infinite;
      font-family: "Impact", "Arial Black", "Microsoft YaHei", sans-serif;
      user-select: none;
      cursor: pointer;
    }

    @keyframes bgMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes spin {
      0%   { transform: rotate(0deg) scale(1); }
      25%  { transform: rotate(3deg) scale(1.05); }
      50%  { transform: rotate(0deg) scale(1.12); }
      75%  { transform: rotate(-3deg) scale(1.05); }
      100% { transform: rotate(0deg) scale(1); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.15); filter: brightness(1.8); }
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      10% { opacity: 0.4; }
      20% { opacity: 1; }
      30% { opacity: 0.2; }
      40% { opacity: 1; }
      50% { opacity: 0.6; }
      60% { opacity: 1; }
      70% { opacity: 0.3; }
      80% { opacity: 1; }
      90% { opacity: 0.8; }
    }

    @keyframes hue {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    @keyframes glitch {
      0% { transform: translate(0, 0) skew(0deg); }
      10% { transform: translate(-8px, 3px) skew(4deg); }
      20% { transform: translate(6px, -4px) skew(-3deg); }
      30% { transform: translate(-10px, 2px) skew(6deg); }
      40% { transform: translate(8px, 0) skew(-5deg); }
      50% { transform: translate(-4px, -5px) skew(3deg); }
      60% { transform: translate(10px, 4px) skew(-6deg); }
      70% { transform: translate(-7px, 1px) skew(5deg); }
      80% { transform: translate(5px, -3px) skew(-2deg); }
      90% { transform: translate(-3px, 2px) skew(1deg); }
      100% { transform: translate(0, 0) skew(0deg); }
    }

    @keyframes shake {
      0%, 100% { transform: translate(0,0) rotate(0deg); }
      20% { transform: translate(-6px, 2px) rotate(-1deg); }
      40% { transform: translate(5px, -3px) rotate(1deg); }
      60% { transform: translate(-4px, 4px) rotate(-1deg); }
      80% { transform: translate(6px, -2px) rotate(1deg); }
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    .wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
    }

    .core {
      position: relative;
      text-align: center;
      transform-style: preserve-3d;
      animation: spin 2.2s ease-in-out infinite, hue 3s linear infinite;
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    .main {
      font-size: min(16vw, 180px);
      line-height: 0.9;
      margin: 0;
      padding: 0.15em 0.35em;
      color: #ffffff;
      text-shadow:
        0 0 8px #000,
        0 0 18px #ff00aa,
        0 0 30px #00ffff,
        0 0 45px #ffff00,
        4px 4px 0 #000,
        8px 8px 0 rgba(0,0,0,0.35),
        -4px -4px 0 rgba(255,255,255,0.2);
      letter-spacing: 0.08em;
      transform: rotateX(18deg);
      animation: pulse 1.2s ease-in-out infinite, flicker 4s linear infinite;
      border: 8px double rgba(255,255,255,0.95);
      border-radius: 28px;
      background: rgba(0,0,0,0.18);
      box-shadow:
        0 0 0 8px rgba(255,255,255,0.15),
        0 0 30px rgba(0,0,0,0.5),
        inset 0 0 30px rgba(255,255,255,0.18);
      mix-blend-mode: screen;
      position: relative;
      overflow: hidden;
      transition:
        opacity 0.5s ease,
        transform 0.5s ease,
        filter 0.5s ease,
        background 0.5s ease,
        border-color 0.5s ease;
    }

    .main::before,
    .main::after {
      content: "hello 张华群";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
    }

    .small {
      display: block;
      font-size: 0.22em;
      margin-bottom: 0.2em;
      letter-spacing: 0.6em;
      color: #000;
      text-shadow:
        0 0 8px #fff,
        0 0 20px #fff,
        0 0 35px #fff;
      transition: opacity 0.4s ease;
    }

    .extra {
      position: absolute;
      inset: -10%;
      pointer-events: none;
      border-radius: 50%;
      border: 14px dotted rgba(255,255,255,0.7);
      animation: spin 8s linear infinite reverse;
      filter: blur(0.5px);
      transition: opacity 0.4s ease;
    }

    .extra2 {
      position: absolute;
      inset: -18%;
      pointer-events: none;
      border-radius: 24px;
      border: 10px dashed rgba(0,0,0,0.55);
      animation: spin 4s linear infinite;
      mix-blend-mode: multiply;
      transition: opacity 0.4s ease;
    }

    .rainbow {
      position: absolute;
      bottom: 6vh;
      left: 0;
      width: 100%;
      font-size: clamp(18px, 3vw, 42px);
      font-weight: 900;
      white-space: nowrap;
      color: #fff;
      text-shadow:
        0 0 5px #000,
        0 0 10px #ff00ff,
        0 0 20px #00ffff;
      animation: hue 2.5s linear infinite;
      transform: scale(1.4);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .blast {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 20vw;
      font-weight: 900;
      color: rgba(255,255,255,0.12);
      letter-spacing: 0.2em;
      transform: rotate(-12deg);
      user-select: none;
      pointer-events: none;
      text-shadow:
        0 0 12px rgba(0,0,0,0.5),
        0 0 40px rgba(255,255,255,0.25);
      transition: opacity 0.4s ease;
    }

    .stamp {
      position: absolute;
      top: 4vh;
      left: 4vw;
      font-size: clamp(22px, 4vw, 60px);
      padding: 0.25em 0.5em;
      color: #ff0000;
      background: #fff;
      border: 6px solid #000;
      transform: rotate(-12deg);
      box-shadow: 10px 10px 0 rgba(0,0,0,0.35);
      animation: pulse 0.8s ease-in-out infinite;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .strip {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      font-size: clamp(14px, 2vw, 26px);
      font-weight: 900;
      color: #fff;
      background: rgba(0,0,0,0.45);
      border-bottom: 3px solid rgba(255,255,255,0.85);
      text-shadow: 0 0 8px #ff0, 0 0 12px #0ff;
      padding: 0.3em 0;
      overflow: hidden;
      white-space: nowrap;
      transition: opacity 0.4s ease;
    }

    .scrolltext {
      display: inline-block;
      padding-left: 100%;
      animation: scroll 10s linear infinite;
    }

    .hint {
      position: absolute;
      top: calc(50% + 140px);
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(14px, 2.5vw, 28px);
      color: rgba(255,255,255,0.95);
      text-shadow: 0 0 8px #000, 0 0 20px #ff0, 0 0 30px #0ff;
      padding: 0.2em 0.6em;
      background: rgba(0,0,0,0.25);
      border: 3px solid rgba(255,255,255,0.6);
      border-radius: 999px;
      animation: pulse 1s ease-in-out infinite;
      pointer-events: none;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    body.clicked {
      background: radial-gradient(circle at center, #000 0%, #0b0018 35%, #22004c 70%, #ff0055 100%);
      animation: none;
    }

    body.clicked .strip,
    body.clicked .rainbow,
    body.clicked .stamp,
    body.clicked .blast,
    body.clicked .hint {
      opacity: 0;
      transform: scale(0.85);
    }

    body.clicked .core {
      animation: shake 0.18s linear infinite, hue 0.7s linear infinite;
    }

    body.clicked .main {
      opacity: 1;
      color: #00ffe1;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(0,255,225,0.12), rgba(255,0,153,0.12));
      border: 10px solid #00ffe1;
      box-shadow:
        0 0 0 10px rgba(255,255,255,0.08),
        0 0 45px rgba(0,255,225,0.95),
        0 0 90px rgba(255,0,153,0.65),
        inset 0 0 40px rgba(255,255,255,0.18);
      text-shadow:
        0 0 10px #000,
        0 0 25px #00ffe1,
        0 0 35px #ff00ff,
        0 0 60px #ffffff,
        6px 6px 0 #000;
      animation: glitch 0.12s infinite, pulse 0.28s ease-in-out infinite, flicker 0.7s linear infinite;
      transform: rotateX(24deg) rotateZ(-2deg) scale(1.18);
      letter-spacing: 0.18em;
      mix-blend-mode: normal;
    }

    body.clicked .small {
      opacity: 0;
    }

    body.clicked .extra {
      inset: -22%;
      border-width: 22px;
      border-style: solid;
      border-color: rgba(255,255,255,0.25);
      animation-duration: 1.5s;
      opacity: 0.9;
      filter: blur(1px);
    }

    body.clicked .extra2 {
      inset: -30%;
      border-width: 16px;
      border-style: dashed;
      border-color: rgba(0,255,225,0.7);
      animation-duration: 0.8s;
      opacity: 1;
      mix-blend-mode: screen;
    }

    body.clicked .main::before {
      content: "你是个人机";
      opacity: 0.2;
      color: #ff00ff;
      mix-blend-mode: screen;
      animation: glitch 0.08s infinite;
    }

    body.clicked .main::after {
      content: "你是个人机";
      opacity: 0.2;
      color: #00ffff;
      transform: translate(6px, -2px);
      mix-blend-mode: screen;
      animation: glitch 0.08s infinite reverse;
    }

    body.clicked .main .text {
      display: inline-block;
      animation: glitch 0.12s infinite, hue 0.7s linear infinite, pulse 0.35s infinite;
      text-shadow:
        0 0 8px #fff,
        0 0 18px #00ffff,
        0 0 28px #ff00ff,
        0 0 48px #ffff00,
        8px 8px 0 #000,
        -8px -8px 0 #000;
    }

    body.clicked .main .text::before,
    body.clicked .main .text::after {
      content: "你是个人机";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0.5;
      pointer-events: none;
    }

    body.clicked .main .text::before {
      transform: translate(-7px, 0);
      color: #ff0055;
      clip-path: inset(0 0 50% 0);
    }

    body.clicked .main .text::after {
      transform: translate(7px, 0);
      color: #00ffff;
      clip-path: inset(50% 0 0 0);
    }

    body.clicked .core {
      filter: saturate(2.5) contrast(1.4);
    }

    body.clicked .wrap::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle, rgba(255,255,255,0.18) 0 2px, transparent 3px) 0 0 / 22px 22px,
        radial-gradient(circle, rgba(255,0,255,0.16) 0 2px, transparent 3px) 11px 11px / 22px 22px;
      animation: spin 10s linear infinite reverse;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    body.clicked .wrap::after {
      content: "你是个人机";
      position: absolute;
      bottom: 10vh;
      font-size: clamp(30px, 6vw, 88px);
      font-weight: 900;
      color: #fff;
      text-shadow:
        0 0 10px #000,
        0 0 20px #ff00ff,
        0 0 35px #00ffff,
        0 0 60px #ffffff;
      letter-spacing: 0.3em;
      opacity: 0.95;
      animation: pulse 0.25s infinite, hue 0.5s linear infinite;
      pointer-events: none;
    }

    .main, .stamp, .strip, .rainbow, .hint, .blast {
      will-change: transform, opacity, filter;
    }
  </style>
</head>
<body>
  <div class="strip">
    <span class="scrolltext">🔥🔥🔥  hello 张华群  hello 张华群  hello 张华群  hello 张华群  hello 张华群  🔥🔥🔥</span>
  </div>

  <div class="stamp">超·夸·张</div>
  <div class="blast">张华群</div>

  <div class="wrap">
    <div class="core" id="core">
      <div class="extra"></div>
      <div class="extra2"></div>
      <div class="main" id="main">
        <span class="small">HELLO</span>
        <span class="text" id="centerText">张华群</span>
      </div>
    </div>

    <div class="hint">点击中间文字</div>
  </div>

  <div class="rainbow">
    <marquee behavior="alternate" scrollamount="18" direction="left">
      ✨ hello 张华群 ✨ hello 张华群 ✨ hello 张华群 ✨ hello 张华群 ✨
    </marquee>
  </div>

  <script>
    const body = document.body;
    const main = document.getElementById('main');
    const centerText = document.getElementById('centerText');
    const hint = document.querySelector('.hint');

    let clicked = false;

    main.addEventListener('click', () => {
      if (clicked) return;
      clicked = true;
      body.classList.add('clicked');
      centerText.textContent = '你是个人机';
      hint.textContent = '已切换模式';
    });
  </script>
</body>
</html>
